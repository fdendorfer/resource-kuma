<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>resource-kuma</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e2e8f0;
    --muted: #64748b;
    --accent: #3b82f6;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 14px; }
  header { display: flex; align-items: center; gap: 12px; padding: 16px 24px; border-bottom: 1px solid var(--border); }
  header h1 { font-size: 18px; font-weight: 600; }
  header h1 span { color: var(--accent); }
  #updated { margin-left: auto; color: var(--muted); font-size: 12px; }
  #range-btns { display: flex; gap: 6px; }
  .range-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .range-btn.active { border-color: var(--accent); color: var(--accent); }
  main { padding: 24px; display: grid; gap: 20px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
  .card-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 16px; }
  .card-title { font-weight: 600; font-size: 15px; }
  .card-value { margin-left: auto; font-size: 22px; font-weight: 700; }
  .card-value.ok { color: var(--green); }
  .card-value.warn { color: var(--yellow); }
  .card-value.crit { color: var(--red); }
  canvas { width: 100% !important; height: 160px !important; }
  .container-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; margin-top: 8px; }
  .cbar { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .cbar-name { font-weight: 500; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cbar-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
  .cbar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .cbar-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }
  @media (max-width: 600px) { main { padding: 12px; } .container-grid { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>
<header>
  <h1>resource<span>-kuma</span></h1>
  <div id="range-btns">
    <button class="range-btn" data-h="1">1h</button>
    <button class="range-btn active" data-h="6">6h</button>
    <button class="range-btn" data-h="24">24h</button>
  </div>
  <span id="updated">—</span>
</header>
<main>
  <div class="card" id="cpu-card">
    <div class="card-header">
      <span class="card-title">CPU</span>
      <span class="card-value" id="cpu-val">—</span>
    </div>
    <canvas id="cpu-chart"></canvas>
  </div>
  <div class="card" id="mem-card">
    <div class="card-header">
      <span class="card-title">Memory</span>
      <span class="card-value" id="mem-val">—</span>
    </div>
    <canvas id="mem-chart"></canvas>
  </div>
  <div class="card">
    <div class="card-header"><span class="card-title">Containers</span></div>
    <div class="container-grid" id="containers"></div>
  </div>
</main>

<script>
// Minimal Chart.js replacement — pure canvas, zero deps
class LineChart {
  constructor(canvas, opts = {}) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.opts = { color: '#3b82f6', fill: true, ...opts };
    this.data = [];
    this._resize();
    window.addEventListener('resize', () => { this._resize(); this.draw(); });
  }
  _resize() {
    const r = window.devicePixelRatio || 1;
    const w = this.canvas.parentElement.clientWidth - 40;
    this.canvas.width = w * r;
    this.canvas.height = 160 * r;
    this.canvas.style.width = w + 'px';
    this.canvas.style.height = '160px';
    this.ctx.scale(r, r);
    this.W = w; this.H = 160;
  }
  setData(points, minY = 0, maxY = 100) {
    this.data = points; this.minY = minY; this.maxY = maxY; this.draw();
  }
  draw() {
    const { ctx, data, W, H, minY, maxY, opts } = this;
    ctx.clearRect(0, 0, W, H);
    if (!data.length) return;

    const pad = { t: 8, b: 24, l: 42, r: 12 };
    const cw = W - pad.l - pad.r, ch = H - pad.t - pad.b;
    const range = maxY - minY || 1;

    // grid lines
    ctx.strokeStyle = '#2a2d3a'; ctx.lineWidth = 1;
    [0, 25, 50, 75, 100].forEach(pct => {
      const y = pad.t + ch * (1 - (pct * (range / 100) + minY - minY) / range);
      ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
      ctx.fillStyle = '#64748b'; ctx.font = '10px system-ui'; ctx.textAlign = 'right';
      ctx.fillText(Math.round(minY + range * pct / 100), pad.l - 6, y + 3);
    });

    // x-axis time labels
    ctx.fillStyle = '#64748b'; ctx.font = '10px system-ui'; ctx.textAlign = 'center';
    const step = Math.floor(data.length / 4);
    for (let i = 0; i < data.length; i += step) {
      const x = pad.l + (i / (data.length - 1)) * cw;
      const d = new Date(data[i].ts * 1000);
      ctx.fillText(d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0'), x, H - 4);
    }

    // line + fill
    const px = (i) => pad.l + (i / (data.length - 1)) * cw;
    const py = (v) => pad.t + ch * (1 - (v - minY) / range);

    ctx.beginPath();
    data.forEach((p, i) => i === 0 ? ctx.moveTo(px(i), py(p.v)) : ctx.lineTo(px(i), py(p.v)));

    if (opts.fill) {
      const grad = ctx.createLinearGradient(0, pad.t, 0, pad.t + ch);
      grad.addColorStop(0, opts.color + '55');
      grad.addColorStop(1, opts.color + '05');
      ctx.lineTo(px(data.length - 1), pad.t + ch);
      ctx.lineTo(px(0), pad.t + ch);
      ctx.closePath();
      ctx.fillStyle = grad; ctx.fill();
      ctx.beginPath();
      data.forEach((p, i) => i === 0 ? ctx.moveTo(px(i), py(p.v)) : ctx.lineTo(px(i), py(p.v)));
    }

    ctx.strokeStyle = opts.color; ctx.lineWidth = 2; ctx.lineJoin = 'round';
    ctx.stroke();
  }
}

const cpuChart = new LineChart(document.getElementById('cpu-chart'), { color: '#3b82f6' });
const memChart = new LineChart(document.getElementById('mem-chart'), { color: '#a855f7' });

let allData = [];
let rangeH = 6;

document.querySelectorAll('.range-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    rangeH = +btn.dataset.h;
    render();
  });
});

function colorFor(pct) {
  if (pct >= 90) return '#ef4444';
  if (pct >= 70) return '#eab308';
  return '#22c55e';
}

function valClass(pct) {
  if (pct >= 90) return 'crit';
  if (pct >= 70) return 'warn';
  return 'ok';
}

function render() {
  if (!allData.length) return;
  const cutoff = Date.now() / 1000 - rangeH * 3600;
  const data = allData.filter(p => p.ts >= cutoff);
  if (!data.length) return;

  const latest = data[data.length - 1];

  // CPU
  const cpuPct = parseFloat(latest.cpu);
  document.getElementById('cpu-val').textContent = cpuPct.toFixed(1) + '%';
  document.getElementById('cpu-val').className = 'card-value ' + valClass(cpuPct);
  cpuChart.setData(data.map(p => ({ ts: p.ts, v: parseFloat(p.cpu) })), 0, 100);

  // Memory
  const memPct = Math.round(latest.mem_used / latest.mem_total * 100);
  document.getElementById('mem-val').textContent = latest.mem_used + ' MB / ' + latest.mem_total + ' MB';
  document.getElementById('mem-val').className = 'card-value ' + valClass(memPct);
  memChart.setData(data.map(p => ({ ts: p.ts, v: p.mem_used })), 0, latest.mem_total);

  // Containers
  const grid = document.getElementById('containers');
  const containers = latest.containers || [];
  grid.innerHTML = containers.map(c => {
    const pct = c.limit > 0 ? Math.round(c.used / c.limit * 100) : 0;
    const color = colorFor(pct);
    const limitStr = c.limit > 0 ? ` / ${c.limit} MB` : '';
    return `<div class="cbar">
      <div class="cbar-name">${c.name}</div>
      <div class="cbar-track"><div class="cbar-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="cbar-labels"><span style="color:${color}">${c.used} MB${limitStr}</span><span>${pct}%</span></div>
    </div>`;
  }).join('');

  // Updated timestamp
  const d = new Date(latest.ts * 1000);
  document.getElementById('updated').textContent = 'updated ' + d.toLocaleTimeString();
}

async function fetchData() {
  try {
    const res = await fetch('data.json?_=' + Date.now());
    allData = await res.json();
    render();
  } catch (e) {
    document.getElementById('updated').textContent = 'error loading data';
  }
}

fetchData();
setInterval(fetchData, 30000);
</script>
</body>
</html>
